# This is the configuration file for DOSBox Staging (0.83.0-RC1).
# Lines starting with a '#' character are comments.

[sdl]

# Rendering backend to use for graphics output ('opengl' by default). Only the
# 'opengl' backend has shader support and is thus the preferred option. The
# 'texture' backend is only provided as a last resort fallback if OpenGL is not
# available or the OpenGL driver is not Core Profile 3.3 compliant. Possible
# values:
#
#   opengl:     OpenGL backend with shader support (default).
#   texture:    SDL's texture backend with bilinear interpolation.
#   texturenb:  SDL's texture backend with nearest-neighbour interpolation
#               (no bilinear).
#
output = texture

# Render driver to use in 'texture' output mode ('auto' by default).
# Use 'texture_renderer = auto' for an automatic choice.
#
texture_renderer = auto

# Number of display to use; values depend on OS and user settings (0 by default).
#
display = 0

# Start in fullscreen mode ('off' by default).
#
fullscreen = on

# Set fullscreen mode ('standard' by default). Possible values:
#
#   standard:           Use the standard fullscreen mode of your operating system
#                       (default).
#
#
fullscreen_mode = standard

# Set initial window size for windowed mode ('default' by default). You can still
# resize the window after startup. Possible values:
#
#   default:   Select the best option based on your environment and other
#              factors (such as whether aspect ratio correction is enabled).
#
#   small, medium, large (s, m, l):
#              Size the window relative to the desktop.
#
#   WxH:       Specify window size in WxH format in logical units (e.g.,
#              1024x768). The values be multiplied by the OS-level DPI scaling to
#              get the window size in pixels.
#
# Note: If you want to use pixel coordinates instead and ignore DPI scaling, set
#       the SDL_WINDOWS_DPI_SCALING environment variable to 0.
#
window_size = default

# Set initial window position for windowed mode ('auto' by default).
# Possible values:
#
#   auto:      Let the window manager decide the position (default).
#
#   X,Y:       Set window position in X,Y format in logical units (e.g., 250,100).
#              0,0 is the top-left corner of the screen. The values will be
#              multiplied by the OS-level DPI scaling to get the window position
#              in pixels.
#
# Note: If you want to use pixel coordinates instead and ignore DPI scaling, set
#       the SDL_WINDOWS_DPI_SCALING environment variable to 0.
#
window_position = auto

# Enable window decorations in windowed mode ('on' by default).
#
window_decorations = on

# Space separated list of information to be displayed in the window's titlebar
# ('program=name dosbox=auto cycles=on mouse=full' by default). If a parameter
# is not specified, its default value is used. Possible information to display:
#
#   animation=<value>:  If set to 'on' (default), animate the audio/video
#                       recording mark. Set to 'off' to disable animation; this
#                       is useful if your screen font produces weird results.
#
#   program=<value>:    Display the name of the running program.
#                       <value> can be one of:
#                         none/off:  Do not display program name.
#                         name:      Program name, with file extension (default).
#                         path:      Name, extension, and full absolute path.
#                         segment:   Display program memory segment name.
#                         'Title':   Custom name. Alternatively, you can use
#                                    "Title", (Title), <Title> or [Title] form.
#
#                       Note: With some software (like Windows 3.1 in enhanced
#                       mode) it is impossible to recognize the full program
#                       name or path; in such cases 'segment' is used instead.
#
#   dosbox=<value>:     Display 'DOSBox Staging' in the title bar.
#                       <value> can be one of:
#                         always:   Always display 'DOSBox Staging'.
#                         auto:     Only display it if no program is running or
#                                   'program=none' is set (default).
#
#   version=<value>:    Display DOSBox version information.
#                       <value> can be one of:
#                          none/off:  Do not display DOSBox version (default).
#                          simple:    Simple version information.
#                          detailed:  Include Git hash, if available.
#
#   cycles=<value>:     If set to 'on' (default), show CPU cycles setting.
#                       Set to 'off' to disable cycles setting display.
#
#   mouse=<value>:      Mouse capturing hint verbosity level:
#                         none/off:  Do not display any mouse hints.
#                         short:     Only display if mouse is captured.
#                         full:      Display verbose information on how to
#                                    capture or release the cursor (default).
#
window_titlebar = program=name dosbox=auto cycles=on mouse=full

# Set the transparency of the DOSBox Staging window (0 by default).
# Valid range from 0 (no transparency) to 90 (high transparency).
#
window_transparency = 0

# Set the host video driver's vertical synchronization (vsync) mode.
# Possible values:
#
#   off:              Disable vsync in both windowed and fullscreen mode
#                     (default). This is the best option on variable refresh rate
#                     (VRR) monitors running in VRR mode to get perfect frame
#                     pacing, no tearing, and low input lag. On fixed refresh rate
#                     monitors (or VRR monitors in fixed refresh mode), disabling
#                     vsync might cause visible tearing in fast-paced games.
#
#   on:               Enable vsync in both windowed and fullscreen mode. This can
#                     prevent tearing in fast-paced games but will increase input
#                     lag. Vsync is only available with 'host-rate' presentation
#                     (see 'presentation_mode').
#
#   fullscreen-only:  Enable vsync in fullscreen mode only. This might be useful
#                     if your operating system enforces vsync in windowed mode and
#                     the 'on' setting causes audio glitches or other issues in
#                     windowed mode only. Vsync is only available with 'host-rate'
#                     presentation (see 'presentation_mode').
#
# Notes:
#   - For perfectly smooth scrolling in 2D games (e.g., in Pinball Dreams
#     and Epic Pinball), you'll need a VRR monitor running in VRR mode and 'vsync'
#     disabled. The scrolling in 70 Hz VGA games will always appear juddery on
#     60 Hz fixed refresh rate monitors even with vsync enabled.
#
#   - Usually, you'll only get perfectly smooth 2D scrolling in fullscreen mode,
#     even on a VRR monitor.
#
#   - For the best results, disable all frame cappers and global vsync overrides
#     in your video driver settings.
#
vsync = off

# Set the frame presentation mode ('auto' by default). Possible values:
#
#   auto:       Use 'host-rate' if 'vsync' is enabled, otherwise use 'dos-rate'
#               (default). See 'vsync' for further details.
#
#   dos-rate:   Present frames at the refresh rate of the emulated DOS video mode.
#               This is the best option on variable refresh rate (VRR) monitors.
#               'vsync' is not availabe with 'dos-rate' presentation.
#
#   host-rate:  Present frames at the refresh rate of the host display. Use this
#               with 'vsync' enabled on fixed refresh rate monitors for fast-paced
#               games where tearing is a problem. 'host-rate' combined with
#               'vsync' disabled can be a good workaround on systems that always
#               enforce blocking vsync at the OS level (e.g., forced 60 Hz vsync
#               could cause problems with VGA games presenting frames at 70 Hz).
#
presentation_mode = auto

# Mute the sound when the window is inactive ('off' by default).
#
mute_when_inactive = off

# Pause emulation when the window is inactive ('off' by default).
#
pause_when_inactive = off

# Capture system keyboard shortcuts ('off' by default).
# When enabled, most system shortcuts such as Alt+Tab are captured and sent to
# DOSBox Staging. This is useful for Windows 3.1 and some DOS programs with
# unchangeable keyboard shortcuts that conflict with system shortcuts.
#
keyboard_capture = off

# Path to the mapper file ('mapper-sdl2-XYZ.map' by default, where XYZ is the
# current version). Pre-configured maps are bundled in 'resources/mapperfiles'.
# These can be loaded by name, e.g., with 'mapperfile = xbox/xenon2.map'.
#
# Note: The '--erasemapper' command line option only deletes the default mapper
#       file.
#
mapperfile = mapper-sdl2-0.83.0-RC1.map

# Use 'allow' or 'block' to override the SDL_VIDEO_ALLOW_SCREENSAVER environment
# variable which usually blocks the OS screensaver while the emulator is
# running ('auto' by default).
#
screensaver = auto


[dosbox]

# Select the DOS messages language ('auto' by default). Possible values:
#
#   auto:     Detects the language from the host OS (default).
#   <value>:  Loads a translation from the given file.
#
# Notes:
#   - The following language files are available:
#     'de', 'en', 'es', 'fr', 'it', 'nl', 'pl', 'pt_BR' and 'ru'.
#
#   - English is built-in, the rest is stored in the bundled
#     'resources/translations' directory.
#
language = auto

# Set the video adapter or machine to emulate ('svga_s3' by default).
# Possible values:
#
#   hercules:       Hercules Graphics Card (HGC) (see 'monochrome_palette').
#
#   cga_mono:       CGA adapter connected to a monochrome monitor (see
#                   'monochrome_palette').
#
#   cga:            IBM Color Graphics Adapter (CGA). Also enables composite
#                   video emulation (see [composite] section).
#
#   pcjr:           An IBM PCjr machine. Also enables PCjr sound and composite
#                   video emulation (see [composite] section).
#
#   tandy:          A Tandy 1000 machine with TGA graphics. Also enables Tandy
#                   sound and composite video emulation (see [composite]
#                   section).
#
#   ega:            IBM Enhanced Graphics Adapter (EGA).
#
#   svga_paradise:  Paradise PVGA1A SVGA card (no VESA VBE; 512K vmem by default,
#                   can be set to 256K or 1MB with 'vmemsize'). This is the
#                   closest to IBM's original VGA adapter.
#
#   svga_et3000:    Tseng Labs ET3000 SVGA card (no VESA VBE; fixed 512K vmem).
#
#   svga_et4000:    Tseng Labs ET4000 SVGA card (no VESA VBE; 1MB vmem by
#                   default, can be set to 256K or 512K with 'vmemsize').
#
#   svga_s3:        S3 Trio64 (VESA VBE 2.0; 4MB vmem by default, can be set to
#                   512K, 1MB, 2MB, or 8MB with 'vmemsize') (default)
#
#   vesa_oldvbe:    Same as 'svga_s3' but limited to VESA VBE 1.2.
#
#   vesa_nolfb:     Same as 'svga_s3' (VESA VBE 2.0), plus the "no linear
#                   framebuffer" hack (needed only by a few games).
#
machine = svga_s3

# Amount of memory of the emulated machine has in MB (16 by default). Best leave
# at the default setting to avoid problems with some games, though a few games
# might require a higher value. There is generally no speed advantage when raising
# this value.
#
memsize = 16

# How software-corrupted memory chain blocks should be handled ('repair' by
# default). Possible values:
#
#   repair:  Repair (and report) faults using adjacent blocks (default).
#   report:  Report faults but otherwise proceed as-is.
#   allow:   Allow faults to go unreported (hardware behavior).
#   deny:    Quit (and report) when faults are detected.
#
mcb_fault_strategy = repair

# Video memory in MB (1-8) or KB (256 to 8192). 'auto' uses the default for
# the selected video adapter ('auto' by default). See the 'machine' setting for
# the list of valid options and defaults per adapter.
#
vmemsize = auto

# Set video memory access delay emulation ('off' by default). Possible values:
#
#   off:       Disable video memory access delay emulation (default).
#              This is preferable for most games to avoid slowdowns.
#
#   on:        Enable video memory access delay emulation (3000 ns).
#              This can help reduce or eliminate flicker in Hercules,
#              CGA, EGA, and early VGA games.
#
#   <number>:  Set access delay in nanoseconds. Valid range is 0 to 20000 ns;
#              500 to 5000 ns is the most useful range.
#
# Note: Only set this on a per-game basis when necessary as it slows down
#       the whole emulator.
#
vmem_delay = off

# Override the emulated DOS video mode's refresh rate with a custom rate
# ('default' by default). Possible values:
#
#   default:   Don't override; use the emulated DOS video mode's refresh rate
#              (default).
#
#   host:      Override the refresh rate of all DOS video modes with the refresh
#              rate of your monitor. This might allow you to play some 70 Hz VGA
#              games with perfect vsync on a 60 Hz fixed refresh rate monitor (see
#              'vsync' for further details).
#
#   <number>:  Override the refresh rate of all DOS video modes with a fixed rate
#              specified in Hz (valid range is from 24.000 to 1000.000). This is a
#              niche option for a select few fast-paced mid to late 1990s 3D games
#              for high refresh rate gaming.
#
# Note: Many games will misbehave when overriding the DOS video mode's refresh
#       rate with non-standard values. This can manifest in glitchy video,
#       sped-up or slowed-down audio, jerky mouse movement, mouse button presses
#       not being registered, and even gameplay bugs. Overriding the DOS refresh
#       rate is a hack that only works acceptably with a small subset of all DOS
#       games (typically mid to late 1990s games).
#
dos_rate = default

# Controls which VESA video modes are available ('compatible' by default).
# Possible values:
#
#   compatible:  Only the most compatible VESA modes for the configured video
#                memory size (default). Recommended with 4 or 8 MB of video
#                memory ('vmemsize') for the widest compatiblity with games.
#                320x200 high colour modes are excluded as they were not
#                properly supported until the late '90s. The 256-colour linear
#                framebuffer 320x240, 400x300, and 512x384 modes are also
#                excluded as they cause timing problems in Build Engine games.
#
#   halfline:    Same as 'compatible', but the 120h VESA mode is replaced with
#                a special halfline mode used by Extreme Assault. Use only if
#                needed.
#
#   all:         All modes are available, including extra DOSBox-specific VESA
#                modes. Use 8 MB of video memory for the best results. Some
#                games misbehave in the presence of certain VESA modes; try
#                'compatible' mode if this happens. The 320x200 high colour
#                modes available in this mode are often required by late '90s
#                demoscene productions.
#
vesa_modes = compatible

# Use 8-pixel-wide fonts on VGA adapters ('off' by default).
#
vga_8dot_font = off

# Emulate accurate per-scanline VGA rendering ('on' by default). Currently, you
# need to disable this for a few games, otherwise they will crash at startup
# (e.g., Deus, Ishar 3, Robinson's Requiem, Time Warriors).
#
vga_render_per_scanline = on

# How autoexec sections are handled from multiple config files ('join' by
# default). Possible values:
#
#   join:       Combine them into one big section (default).
#   overwrite:  Use the last one encountered, like other config settings.
#
autoexec_section = join

# Mount 'drives/[c]' directories as drives on startup, where [c] is a lower-case
# drive letter from 'a' to 'y' ('on' by default). The 'drives' folder can be
# provided relative to the current directory or via built-in resources.
# Mount settings can be optionally provided using a [c].conf file along-side
# the drive's directory, with content as follows:
#
#   [drive]
#   type     = dir, overlay, floppy, cdrom or iso (same as cdrom)
#   label    = custom_label
#   path     = path-specification (e.g., path = %path%;c:\tools)
#   override_drive = mount the directory to this drive instead (default empty)
#   verbose  = on or off
#   readonly = on or off
#
automount = on

# Controls verbosity prior to displaying the program ('auto' by default):
#
#   Verbosity   | Welcome | Early stdout
#   high        |   yes   |    yes
#   low         |   no    |    yes
#   quiet       |   no    |    no
#   auto        | 'low' if exec or dir is passed, otherwise 'high'
#
startup_verbosity = auto

# Many games open all their files with writable permissions; even files that they
# never modify. This setting lets you write-protect those files while still
# allowing the game to read them ('on' by default). A second use-case: if you're
# using a copy-on-write or network-based filesystem, this setting avoids
# triggering write operations for these write-protected files.
#
allow_write_protected_files = on

# Allow shortcuts for simpler configuration management ('on' by default).
# E.g., instead of 'config -set sbtype sb16', it is enough to execute
# 'sbtype sb16', and instead of 'config -get sbtype', you can just execute
# the 'sbtype' command.
#
shell_config_shortcuts = on

# Set the emulated hard disk speed ('maximum' by default). Possible values:
#
#   maximum:  As fast as possible, no slowdown (default)
#   fast:     Typical mid-1990s hard disk speed (~15 MB/s)
#   medium:   Typical early 1990s hard disk speed (~2.5 MB/s)
#   slow:     Typical 1980s hard disk speed (~600 kB/s)
#
hard_disk_speed = maximum

# Set the emulated floppy disk speed ('maximum' by default). Possible values:
#
#   maximum:  As fast as possible, no slowdown (default)
#   fast:     Extra-high density (ED) floppy speed (~120 kB/s)
#   medium:   High density (HD) floppy speed (~60 kB/s)
#   slow:     Double density (DD) floppy speed (~30 kB/s)
#
floppy_disk_speed = maximum


[render]

# Set an adaptive CRT monitor emulation shader or a regular shader ('crt-auto' by
# default). Shaders are only supported in the OpenGL output mode (see 'output').
# Adaptive CRT shader options:
#
#   crt-auto:               Adaptive CRT shader that prioritises developer intent
#                           and how people experienced the games at the time of
#                           release (default). An appropriate shader variant is
#                           auto-selected based the graphics standard of the
#                           current video mode and the viewport size, irrespective
#                           of the 'machine' setting. This means you'll get the
#                           authentic single-scanned CGA and EGA monitor look with
#                           visible scanlines in CGA and EGA games even on an
#                           emulated VGA adapter. The sharp shader is used below
#                           3.0x vertical scaling.
#
#   crt-auto-machine:       A variation of 'crt-auto'; this emulates a fixed CRT
#                           monitor for the video adapter configured via the
#                           'machine' setting. E.g., CGA and EGA games will appear
#                           double-scanned on an emulated VGA adapter.
#
#   crt-auto-arcade:        Emulation of an arcade or home computer monitor with
#                           a less sharp image and thick scanlines in low-
#                           resolution video modes. This is a fantasy option that
#                           never existed in real life, but it can be a lot of
#                           fun, especially with DOS ports of Amiga games.
#
#   crt-auto-arcade-sharp:  A sharper arcade shader variant for those who like the
#                           thick scanlines but want to retain the sharpness of a
#                           typical PC monitor.
#
# Other shader options include (non-exhaustive list):
#
#   sharp:     Upscale the image treating the pixels as small rectangles,
#              resulting in a sharp image with minimum blur while maintaining
#              the correct pixel aspect ratio. This is the recommended option for
#              those who don't want to use the adaptive CRT shaders.
#
#   bilinear:  Upscale the image using bilinear interpolation (results in a blurry
#              image).
#
#   nearest:   Upscale the image using nearest-neighbour interpolation (also known
#              as "no bilinear"). This results in the sharpest possible image at
#              the expense of uneven pixels, especially with non-square pixel
#              aspect ratios (this is less of an issue on high resolution
#              monitors).
#
# Start DOSBox Staging with the '--list-shaders' command line option to see the
# full list of available shaders. You can also use an absolute or relative path to
# a file. In all cases, you may omit the shader's '.glsl' file extension.
#
shader = crt-auto

# Set the aspect ratio correction mode ('auto' by default). Possible values:
#
#   auto, on:            Apply aspect ratio correction for modern square-pixel
#                        flat-screen displays, so DOS video modes with non-square
#                        pixels appear as they would on a 4:3 display aspect
#                        ratio CRT monitor the majority of DOS games were designed
#                        for. This setting only affects video modes that use non-
#                        square pixels, such as 320x200 or 640x400; square pixel
#                        modes (e.g., 320x240, 640x480, and 800x600), are
#                        displayed as-is.
#
#   square-pixels, off:  Don't apply aspect ratio correction; all DOS video modes
#                        will be displayed with square pixels. Most 320x200 games
#                        will appear squashed, but a minority of titles (e.g.,
#                        DOS ports of PAL Amiga games) need square pixels to
#                        appear as the artists intended.
#
#   stretch:             Calculate the aspect ratio from the viewport's
#                        dimensions. Combined with the 'viewport' setting, this
#                        mode is useful to force arbitrary aspect ratios (e.g.,
#                        stretching DOS games to fullscreen on 16:9 displays) and
#                        to emulate the horizontal and vertical stretch controls
#                        of CRT monitors.
#
aspect = off

# Constrain the horizontal or vertical scaling factor to the largest integer
# value so the image still fits into the viewport ('auto' by default). The
# configured aspect ratio is always maintained according to the 'aspect' and
# 'viewport' settings, which may result in a non-integer scaling factor in the
# other dimension. If the image is larger than the viewport, the integer scaling
# constraint is auto-disabled (same as 'off'). Possible values:
#
#   auto:        A special vertical mode auto-enabled only for the CRT shaders
#                (see `shader`). This mode has refinements over standard vertical
#                integer scaling: 3.5x and 4.5x scaling factors are also allowed,
#                and integer scaling is disabled above 5.0x scaling.
#
#   vertical:    Constrain the vertical scaling factor to integer values. This is
#                the recommended setting for 3rd party CRT shaders with scanline
#                simulation to avoid uneven scanlines and interference artifacts.
#                For the built-in CRT shaders, use 'auto'.
#
#   horizontal:  Constrain the horizontal scaling factor to integer values. Might
#                be useful on low-resolution displays to optimise for horizontal
#                text sharpness.
#
#   off:         Apply no integer scaling constraint; the image fills the viewport
#                while maintaining the configured aspect ratio.
#
integer_scaling = auto

# Set the viewport size ('fit' by default). This is the maximum drawable area;
# the video output is always contained within the viewport while taking the
# configured aspect ratio into account (see 'aspect'). Possible values:
#
#   fit:               Fit the viewport into the available window/screen
#                      (default). There might be padding (black areas) around the
#                      image with 'integer_scaling' enabled.
#
#   WxH:               Set a fixed viewport size in WxH format in logical units
#                      (e.g., 960x720). The specified size must not be larger than
#                      the desktop. If it's larger than the window size, it will
#                      be scaled to fit within the window.
#
#   N%:                Similar to 'WxH', but the size is specified as a percentage
#                      of the desktop size.
#
#   relative H% V%:    The viewport is set to a 4:3 aspect ratio rectangle fit
#                      into the available window or screen, then is scaled by
#                      the H and V horizontal and vertical scaling factors (valid
#                      range is from 20% to 300%). The resulting viewport is
#                      allowed to extend beyond the bounds of the window or
#                      screen. Useful to force arbitrary display aspect ratios
#                      with 'aspect = stretch' and to "zoom" into the image.
#                      This effectively emulates the horizontal and vertical
#                      stretch controls of CRT monitors.
#
# Notes:
#   - Using 'relative' mode with 'integer_scaling' enabled could lead to
#     surprising (but correct) results.
#
#   - Use the 'Stretch Axis', 'Inc Stretch', and 'Dec Stretch' hotkey actions to
#     adjust the image size in 'relative' mode in real-time, then copy the new
#     settings from the logs into your config.
#
viewport = fit

# Set the palette for monochrome display emulation ('amber' by default).
# Works only with the 'hercules' and 'cga_mono' machine types. Possible values:
#
#   amber:       Amber palette (default).
#   green:       Green palette.
#   white:       White palette.
#   paperwhite:  Paperwhite palette.
#
# Note: You can also cycle through the available palettes via hotkeys.
#
monochrome_palette = amber

# Set the interpretation of CGA RGBI colours ('default' by default). Affects all
# machine types capable of displaying CGA or better graphics, including the PCjr,
# the Tandy, and CGA/EGA modes on VGA adapters. Note these colours will be further
# adjusted by the video output settings (see 'crt_color_profile', 'brightness',
# 'saturation', etc.). Built-in presets:
#
#   default:       The canonical CGA palette, as emulated by VGA adapters
#                  (default).
#
#   tandy <bl>:    Emulation of an idealised Tandy monitor with adjustable brown
#                  level. The brown level can be provided as an optional second
#                  parameter (0 - red, 50 - brown, 100 - dark yellow;
#                  defaults to 50). E.g., tandy 100
#
#   tandy-warm:    Emulation of the actual colour output of an unknown Tandy
#                  monitor. Intended to be used with 'crt_color_profile = none'
#                  and 'color_temperature = 6500'.
#
#   ibm5153 <c>:   Emulation of the actual colour output of an IBM 5153 monitor
#                  with a unique contrast control that dims non-bright colours
#                  only. The contrast can be optionally provided as a second
#                  parameter (0 to 100; defaults to 100), e.g., ibm5153 60.
#                  Intended to be used with 'crt_color_profile = none' and
#                  'color_temperature = 6500'.
#
#   agi-amiga-v1, agi-amiga-v2, agi-amiga-v3:
#                  Palettes used by the Amiga ports of Sierra AGI games.
#
#   agi-amigaish:  A mix of EGA and Amiga colours used by the Sarien
#                  AGI-interpreter.
#
#   scumm-amiga:   Palette used by the Amiga ports of LucasArts EGA games.
#
#   colodore:      Commodore 64 inspired colours based on the Colodore palette.
#
#   colodore-sat:  Colodore palette with 20% more saturation.
#
#   dga16:         A modern take on the canonical CGA palette with dialed back
#                  contrast.
#
# You can also set custom colours by specifying 16 space or comma separated
# sRGB colour values, either as 3 or 6-digit hex codes (e.g., #f00 or #ff0000 for
# full red), or decimal RGB triplets (e.g., (255, 0, 255) for magenta). The 16
# colours are ordered as follows:
#
#   black, blue, green, cyan, red, magenta, brown, light-grey, dark-grey,
#   light-blue, light-green, light-cyan, light-red, light-magenta, yellow, white.
#
# Their default values, shown here in 6-digit hex code format, are:
#
#   #000000 #0000aa #00aa00 #00aaaa #aa0000 #aa00aa #aa5500 #aaaaaa
#   #555555 #5555ff #55ff55 #55ffff #ff5555 #ff55ff #ffff55 #ffffff
#
cga_colors = default

# Set the colour space of the video output ('srgb' by default). This setting
# allows to take advantage of wide color gamut monitors and to more accurately
# emulate CRT colors. Possible values:
#
#   srgb:        The lowest common denominator non-wide gamut sRGB colour space
#                with 6500K white point and sRGB gamma (default).
#
#   display-p3:  Display P3 wide gamut colour space with 6500K white point and
#                sRGB gamma.
#
#   dci-p3:      Standard DCI-P3 wide gamut colour space with DCI white point
#                (~6300K) and a 2.6 gamma. Use 'dci-p3-d65' instead if the whites
#                and grays have a greenish tint with your monitor in DCI-P3 mode.
#
#   dci-p3-d65:  DCI-P3 variant with modified D65 white point (6500K) and 2.6
#                gamma. Use 'dci-p3' instead if the whites and grays have a
#                yellowish tint with your monitor in DCI-P3 mode.
#
#   modern-p3:   Setting for average consumer/gaming monitors that only reach
#                around 90% DCI-P3 colour space gamut coverage (6500K white
#                point, sRGB gamma). Use the other DCI-P3 colour spaces if your
#                monitor's DCI-P3 coverage is close to 100%.
#
#   adobe-rgb:   AdobeRGB 2020 wide gamut colour space with 6500K white point
#                and 2.2 gamma.
#
#   rec-2020:    Rec.2020 wide gamut colour space with 6500K white point and 2.2
#                gamma.
#
# Notes:
#   - Colour space transforms are applied to rendered screenshots, but not to raw
#     and upscaled screenshots and video captures (those are always in sRGB).
#
#   - The feature only works in OpenGL output mode.
#
#   - The setting must match the colour space set on your monitor.
#
#   - You must disable all OS and graphics driver level colour management, and you
#     must not use any 3rd party colour management programs for DOSBox Staging,
#     otherwise you'll get incorrect colours.
#
color_space = srgb

# Enable image adjustments ('on' by default). When disabled, the image adjustment
# settings in the render section (e.g., 'crt_color_profile', 'brightness',
# 'contrast', etc.) have no effect and the raw RGB values are used for the video
# output. The colour space conversion is always active, that cannot be disabled
# (see 'color_space').
#
# Notes:
#   - Image adjustments only work in OpenGL output mode.
#
#   - Adjustments are applied to rendered screenshots, but not to raw and upscaled
#     screenshots and video captures.
#
#   - Use the 'PrevImageAdj' and 'NextImageAdj' hotkeys to select an image
#     adjustment setting and the 'DecImageAdj' and 'IncImageAdj' hotkeys to adjust
#     the settings in real-time. Copy the new settings from the logs into your
#     config, or write a new config with the 'CONFIG -wc' command.
#
image_adjustments = on

# Set a CRT colour profile for more authentic video output emulation ('auto' by
# default). Possible values:
#
#   auto:       Select an authentic colour profile appropriate for the currently
#               active adaptive CRT shader (e.g. 'crt-auto'), or the current
#               machine type for regular shaders (e.g., 'sharp').
#
#   none:       Display raw colours without any colour profile transforms.
#
#   ebu:        EBU standard phosphor emulation, used in high-end professional CRT
#               monitors, such as the Sony BVM/PVM series.
#
#   p22:        P22 phosphor emulation, most commonly used in lower-end CRT
#               monitors.
#
#   smpte-c:    SMPT "C" phosphor emulation, the standard for American broadcast
#               video monitors.
#
#   philips:    Philips CRT monitor colours typical to 15 kHz home computer
#               monitors (e.g. the Commodore 1084S). The intended use of this
#               profile is with 'color_temperature' set to 6500. The output then
#               will look yellowish due to the ~6100 K colour temperature typical
#               to Philips CRTs "baked into" this profile. You can still tweak 
#               'color_temperature' to adjust the white balance. Needs a wide
#               gamut DCI-P3 display for the most accurate results.
#
#   trinitron:  Typical Sony Trinitron CRT TV and monitor colours. The intended
#               use of this profile is with 'color_temperature' set to 6500. The
#               output then will look blueish due to the ~9300 K colour
#               temperature typical to Trinitron CRTs "baked into" this profile.
#               You can still tweak 'color_temperature' to adjust the relative
#               white balance. Needs a wide gamut DCI-P3 display for the most
#               accurate results.
#
crt_color_profile = auto

# Set the brightness of the video output (45 by default). Valid range is 0 to 100.
# This emulates the brightness control of CRT monitors that sets the black point;
# higher values will result in raised blacks.
#
brightness = 45

# Set the contrast of the video output (65 by default). Valid range is 0 to 100.
# This emulates the contrast control of CRT monitors that sets the white point;
# higher values will result in raised blacks (lower the 'brightness' control to
# compensate).
#
contrast = 65

# Set the gamma of the video output (0 by default). Valid range is -50 to 50.
# This is additional gamma adjustment relative to the emulated virtual monitor's
# gamma.
#
gamma = 0

# Set the digital contrast of the video output (0 by default). Valid range is -50
# to 50. This works very differently from the 'contrast' virtual monitor setting;
# digital contrast is applied to the raw RGB values of the framebuffer image.
#
digital_contrast = 0

# Raise the black level of the video output ('auto' by default). It is applied
# before the 'brightness' and 'contrast' settings which can also raise the black
# level, so it effectively acts as a black level boost. Possible values:
#
#   auto:      Raise the black level for PCjr, Tandy, CGA and EGA video modes only
#              for adaptive CRT shaders; for any other shader, use 0 (default).
#
#   <number>:  Set the black level raise amount. Valid range is 0 to 100.
#              0 does not raise the black level.
#
# Note: Raising the black level if useful for "black scanline" emulation; this
#       adds visual interest to PCjr, Tandy, CGA, and EGA games with simple
#       graphics.
#
black_level = auto

# Set the saturation of the video output (0 by default). Valid range is -50 to 50.
# This is digital saturation applied to the raw RGB values of framebuffer image,
# similarly to 'digital_contrast'.
#
saturation = 0

# Set the colour temperature (white point) of the video output ('auto' by
# default). Possible values:
#
#   auto:      Select an authentic colour temperature appropriate for the
#              currently active adaptive CRT shader (e.g. 'crt-auto'), or the
#              current machine type for regular shaders (e.g., 'sharp').
#              
#   <number>:  Specify colour temperature in Kelvin (K). Valid range is 3000 to
#              10000. 6500 K is the neutral point for most modern displays. Values
#              below 6500 result in warmer colours, values above 6500 in cooler
#              colours.
#
color_temperature = auto

# Preserve luminosity of the video output prior to colour temperature adjustment
# (0 by default). Valid range is 0 to 100. 0 doesn't perform any luminosity 
# preservation, 100 fully preserves the luminosity. Values greater than 0 result
# in inaccurate colour temperatures in the brighter shades, so it's best to set
# this to 0 or close to 0 if your monitor is bright enough.
#
color_temperature_luma_preserve = 0

# Set gain factor of the video output's red channel (100 by default). Valid range
# is 0 to 200. 100 results in no gain change.
#
red_gain = 100

# Set gain factor of the video output's green channel (100 by default). Valid
# range is 0 to 200. 100 results in no gain change.
#
green_gain = 100

# Set gain factor of the video output's blue channel (100 by default). Valid range
# is 0 to 200. 100 results in no gain change.
#
blue_gain = 100

# Remove black lines from interlaced videos ('off' by default). Use with games
# that display video content with alternating black lines. This trick worked well
# on CRT monitors to increase perceptual resolution while saving storage space,
# but it resulted in brightness-loss. Possible values:
#
#   off:     Disable deinterlacing (default).
#
#   on:      Enable deinterlacing at 'medium' strength.
#
#   light:   Light deinterlacing. Black scanlines are softened to mimic the
#            CRT look.
#
#   medium:  Medium deinterlacing. Best balance between removing black lines,
#            increasing brightness, and keeping the higher resolution look.
#
#   strong:  Strong deinterlacing. Image brightness is almost completely
#            restored at the expense of diminishing the higher resolution look.
#
#   full:    Full deinterlacing. Completely removes black lines and maximises
#            brightness, but the image will appear blockier.
#
# Note: Enabling vertical 'integer_scaling' is recommended on lower resolution
#       displays to avoid interference artifacts when using lower deinterlacing
#       strengths. Alternatively, use 'full' strength to completely eliminate all
#       potential interference patterns.
#
deinterlacing = off

# Remove checkerboard dither patterns from the video output ('off' by default).
# Useful with CGA and EGA games that use dither patterns to create the illusion
# of more colours with the limited CGA/EGA palettes. Possible values:
#
#   off:       Disable dedithering (default).
#   on:        Enable dedithering (at full strength).
#
#   <number>:  Set dedithering strength from 0 (off) to 100 (full strength). Lower
#              values result in a subtle softening of dither patterns; higher
#              values blend between the original and the dedithered image.
#
# Notes:
#    - Dedithering only works in OpenGL output mode.
#
#    - Dedithering is applied to rendered screenshots, but not to raw and upscaled
#      screenshots and video captures.
#
dedithering = off


[composite]

# Enable CGA composite monitor emulation ('auto' by default). Only available for
# 'cga', 'pcjr', and 'tandy' machine types. This allows the emulation of NTSC
# artifact colours from the raw CGA RBGI image data, just like on a real NTSC CGA
# composite monitor. Possible values:
#
#   off:   Disable composite emulation.
#
#   on:    Enable composite emulation in all video modes.
#
#   auto:  Automatically enable composite emulation for the 640x400 composite
#          mode if the game uses it (default). You need to enable composite mode
#          manually for the 320x200 mode.
#
# Note: Fine-tune the composite emulation settings (e.g., 'hue') using the
#       composite hotkeys, then copy the new settings from the logs into your
#       config.
#
composite = auto

# Era of CGA composite monitor to emulate ('auto' by default).
# Possible values:
#
#   auto:  PCjr uses 'new', and CGA/Tandy use 'old' (default)
#   old:   Emulate an early NTSC IBM CGA composite monitor model.
#   new:   Emulate a late NTSC IBM CGA composite monitor model.
#
era = auto

# Set the hue of the CGA composite colours (0 by default).
# Valid range is -360 to 360. For example, adjust until the sky appears blue and
# the grass green in the game. This emulates the tint knob of CGA composite
# monitors which often had to be adjusted for each game.
#
hue = 0

# Set the sharpness of the CGA composite image (0 by default).
# Valid range is -50 to 50.
#
convergence = 0


[cpu]

# Type of CPU emulation core to use ('auto' by default). Possible values:
#
#   auto:     'normal' core for real mode programs, 'dynamic' core for protected
#             mode programs (default). Most programs will run correctly with this
#             setting.
#
#   normal:   The DOS program is interpreted instruction by instruction. This
#             yields the most accurate timings, but puts 3-5 times more load on
#             the host CPU compared to the 'dynamic' core. Therefore, it's
#             generally only recommended for real mode programs that don't need
#             a fast emulated CPU or are timing-sensitive. The 'normal' core is
#             also necessary for programs that self-modify their code.
#
#   simple:   The 'normal' core optimised for old real mode programs; it might
#             give you slightly better compatibility with older games. Auto-
#             switches to the 'normal' core in protected mode.
#
#   dynamic:  The instructions of the DOS program are translated to host CPU
#             instructions in blocks and are then executed directly. This puts
#             3-5 times less load on the host CPU compared to the 'normal' core,
#             but the timings might be less accurate. The 'dynamic' core is a
#             necessity for demanding DOS programs (e.g., 3D SVGA games).
#             Programs that self-modify their code might misbehave or crash on
#             the 'dynamic' core; use the 'normal' core for such programs.
#
core = dynamic

# CPU type to emulate ('auto' by default). You should only change this if the
# program doesn't run correctly on 'auto'. Possible values:
#
#   auto:          The fastest and most compatible setting (default).
#                  Technically, this is '386_fast' plus 486 CPUID, 486 CR
#                  register behaviour, and extra 486 instructions.
#
#   386:           386 CPUID and 386 specific page access level calculation.
#
#   386_fast:      Same as '386' but with loose page privilege checks which is
#                  much faster.
#
#   386_prefetch:  Same as '386_fast' plus accurate CPU prefetch queue emulation.
#                  Requires 'core = normal'. This setting is necessary for
#                  programs that self-modify their code or employ anti-debugging
#                  tricks. Games that require '386_prefetch' include Contra, FIFA
#                  International Soccer (1994), Terminator 1, and X-Men: Madness
#                  in The Murderworld.
#
#   486:           486 CPUID, 486+ specific page access level calculation, 486 CR
#                  register behaviour, and extra 486 instructions.
#
#   pentium:       Same as '486' but with Pentium CPUID, Pentium CR register
#                  behaviour, and RDTSC instruction support. Recommended for
#                  Windows 3.1 games (e.g., Betrayal in Antara).
#
#   pentium_mmx:   Same as 'pentium' plus MMX instruction set support. Very few
#                  games use MMX instructions; it's mostly only useful for
#                  demoscene productions.
#
cputype = auto

# Speed of the emulated CPU ('3000' by default). If 'cpu_cycles_protected' is on
# 'auto', this sets the cycles for both real and protected mode programs.
# Possible values:
#
#   <number>:  Emulate a fixed number of cycles per millisecond (roughly
#              equivalent to MIPS). Valid range is from 50 to 2000000.
#
#   max:       Emulate as many cycles as your host CPU can handle on a single
#              core. The number of cycles per millisecond can vary; this might
#              cause issues in some DOS programs.
# Notes:
#   - Setting the CPU speed to 'max' or to high fixed values may result in sound
#     drop-outs and general lagginess.
#
#   - Set the lowest fixed cycles value that runs the game at an acceptable speed
#     for the best results.
#
#   - Ballpark cycles values for common CPUs. DOSBox does not do cycle-accurate
#     CPU emulation, so treat these as starting points, then fine-tune per game.
#
#       8088 (4.77 MHz)     300
#       286-8               700
#       286-12             1500
#       386SX-20           3000
#       386DX-33           6000
#       386DX-40           8000
#       486DX-33          12000
#       486DX/2-66        25000
#       Pentium 90        50000
#       Pentium MMX-166  100000
#       Pentium II 300   200000
#
cpu_cycles = max

# Speed of the emulated CPU for protected mode programs only ('60000' by
# default). Possible values:
#
#   auto:      Use the `cpu_cycles' setting.
#
#   <number>:  Emulate a fixed number of cycles per millisecond (roughly
#              equivalent to MIPS). Valid range is from 50 to 2000000.
#
#   max:       Emulate as many cycles as your host CPU can handle on a single
#              core. The number of cycles per millisecond can vary; this might
#              cause issues in some DOS programs.
#
# Note: See 'cpu_cycles' setting for further info.
#
cpu_cycles_protected = max

# Throttle down the number of emulated CPU cycles dynamically if your host CPU
# cannot keep up ('off' by default). Only affects fixed cycles settings. When
# enabled, the number of cycles per millisecond can vary; this might cause issues
# in some DOS programs.
#
cpu_throttle = off

# Number of cycles to add with the 'Inc Cycles' hotkey (10 by default).
# Values lower than 100 are treated as a percentage increase.
#
cycleup = 10

# Number of cycles to subtract with the 'Dec Cycles' hotkey (20 by default).
# Values lower than 100 are treated as a percentage decrease.
#
cycledown = 20

# Reduce the CPU usage in the DOS shell and in some applications when DOSBox is
# idle ('on' by default). This is done by emulating the HLT CPU instruction, so
# it might interfere with other power management tools such as DOSidle and FDAPM
# when enabled.
#
cpu_idle = on


[voodoo]

# Enable 3dfx Voodoo emulation ('on' by default). This is authentic low-level
# emulation of the Voodoo card without any OpenGL passthrough, so it requires a
# powerful CPU. Most games need the DOS Glide driver called 'GLIDE2X.OVL' to be
# in the path for 3dfx mode to work. Many games include their own Glide driver
# variants, but for some you need to provide a suitable 'GLIDE2X.OVL' version.
# A small number of games integrate the Glide driver into their code, so they
# don't need 'GLIDE2X.OVL'.
#
voodoo = off

# Set the amount of video memory for 3dfx Voodoo graphics (4 by default). The
# memory is used by the Frame Buffer Interface (FBI) and Texture Mapping Unit
# (TMU). Possible values:
#
#    4: 2 MB for the FBI and one TMU with 2 MB (default).
#   12: 4 MB for the FBI and two TMUs, each with 4 MB.
#
voodoo_memsize = 4

# Use threads to improve 3dfx Voodoo performance ('auto' by default). Possible
# values:
#
#   auto:      Use up to 16 threads based on available CPU cores (default).
#   <number>:  Set a specific number of threads between 1 and 128.
#
# Note: Setting this to a higher value than the number of logical CPUs your
#       hardware supports is very likely to harm performance. This has been
#       measured to scale well up to 8-16 threads, but it has not been tested
#       on a many-core CPU. If you have a Threadripper or similar CPU, please
#       let us know how it goes.
#
voodoo_threads = auto

# Use bilinear filtering to emulate the 3dfx Voodoo's texture smoothing effect
# ('on' by default). Bilinear filtering can impact frame rates on slower systems;
# try turning it off if you're not getting adequate performance.
#
voodoo_bilinear_filtering = on


[capture]

# Directory where the various captures are saved, such as audio, video, MIDI
# and screenshot captures ('capture' in the current working directory by
# default).
#
capture_dir = capture

# Set the capture format of the default screenshot action ('upscaled' by
# default). Possible values:
#
#   upscaled:  The image is bilinear-sharp upscaled and the correct aspect
#              ratio is maintained, depending on the 'aspect' setting. The
#              vertical scaling factor is always an integer. For example,
#              320x200 content is upscaled to 1600x1200 (5:6 integer scaling),
#              640x480 to 1920x1440 (3:3 integer scaling), and 640x350 to
#              1400x1050 (2.1875:3 scaling; fractional horizontally and
#              integer vertically). The filenames of upscaled screenshots
#              have no postfix (e.g. 'image0001.png').
#
#   rendered:  The post-rendered, post-shader image shown on the screen is
#              captured. The filenames of rendered screenshots end with
#              '-rendered' (e.g. 'image0001-rendered.png').
#
#   raw:       The contents of the raw framebuffer is captured (this always
#              results in square pixels). The filenames of raw screenshots
#              end with '-raw' (e.g. 'image0001-raw.png').
#
# If multiple formats are specified separated by spaces, the default
# screenshot action will save multiple images in the specified formats.
# Keybindings for taking single screenshots in specific formats are also
# available.
#
default_image_capture_formats = upscaled


[mouse]

# Set the mouse capture behaviour ('onclick' by default). Possible values:
#
#   onclick:   Capture the mouse when clicking any mouse button in the window
#              (default).
#
#   onstart:   Capture the mouse immediately on start. Might not work correctly
#
#              on some host operating systems.
#   seamless:  Let the mouse move seamlessly between the DOSBox window and the
#              rest of the desktop; captures only with middle-click or hotkey.
#              Seamless mouse does not work correctly with all the games.
#              Windows 3.1 can be made compatible with a custom mouse driver.
#
#   nomouse:   Hide the mouse and don't send mouse input to the game.
#
# Note: Use 'seamless' mode for touch screens.
#
mouse_capture = onclick

# Release the captured mouse by middle-clicking, and also capture it in seamless
# mode ('on' by default).
#
mouse_middle_release = on

# Allow seamless mouse behavior and mouse pointer release to work in fullscreen
# mode on systems with more than one display ('on' by default).
#
# Note: You should disable this if it incorrectly detects multiple displays
#       when only one should actually be used. This might happen if you are
#       using mirrored display mode or using an AV receiver's HDMI input for
#       audio-only listening.
#
mouse_multi_display_aware = on

# Set global mouse sensitivity (100 by default). Possible values:
#
#   <value>:  Set sensitivity for both axes as a percentage (e.g. 150).
#
#   X,Y:      Set X and Y axis sensitivity separately as percentages (e.g.,
#             100,150). The two values can be separated by a space or a semicolon
#             as well.
#
# Notes:
#   - Negative values invert an axis, zero disables it.
#
#   - Sensitivity can be fine-tuned futher per mouse interface with the internal
#     MOUSECTL.COM command.
#
mouse_sensitivity = 100

# Bypass the mouse acceleration and sensitivity settings of the host operating
# system ('on' by default). Works in fullscreen or when the mouse is captured
# in windowed mode.
#
mouse_raw_input = on

# Built-in DOS mouse driver mode ('on' by default). It bypasses the PS/2 and
# serial (COM) ports and communicates with the mouse directly. This results in
# lower input lag, smoother movement, and increased mouse responsiveness, so only
# disable it and load a real DOS mouse driver if it's really necessary (e.g., if a
# game is not compatible with the built-in driver). Possible values:
#
#   on:      Simulate a mouse driver TSR program loaded from AUTOEXEC.BAT
#            (default). This is the most compatible way to emulate the DOS mouse
#            driver, but if it doesn't work with your game, try the 'no-tsr'
#            setting.
#
#   no-tsr:  Enable the mouse driver without simulating the TSR program. Let us
#            know if it fixes any software not working with the 'on' setting.
#
#   off:     Disable the built-in mouse driver. You can still start it at runtime
#            by executing the bundled MOUSE.COM from drive Z.
#
# Notes:
#   - The `ps2_mouse_model` and `com_mouse_model` settings have no effect on the
#     built-in driver.
#
#   - The driver is auto-disabled if you boot into real MS-DOS or Windows 9x
#     under DOSBox. Under Windows 3.1, the driver is not disabled, but the
#     Windows 3.1 mouse driver takes over.
#
#   - To use a real DOS mouse driver (e.g., MOUSE.COM or CTMOUSE.EXE), configure
#     the mouse type with `ps2_mouse_model` or `com_mouse_model`, then load the
#     driver.
#
#
builtin_dos_mouse_driver = on

# Set the mouse model to be simulated by the built-in DOS mouse driver ('2button'
# by default). Possible values:
#
#   2button:  2 buttons, the safest option for most games. The majority of DOS
#             games only support 2 buttons, some might misbehave if the middle
#             button is pressed.
#
#   3button:  3 buttons, only supported by very few DOS games. Only use this if
#             the game is known to support a 3-button mouse.
#
#   wheel:    3 buttons + wheel, supports the CuteMouse WheelAPI version 1.0.
#             No DOS game uses the mouse wheel, only a handful of DOS applications
#             and Windows 3.1 with special third-party drivers.
#
builtin_dos_mouse_driver_model = 2button

# The smallest amount of mouse movement that will be reported to the guest
# (1 by default). Some DOS games cannot properly respond to small movements, which
# were hard to achieve using the imprecise ball mice of the era; in such case
# increase the amount to the smallest value that results in a proper cursor
# motion. Possible values:
#
#   1-9:  The smallest amount of movement to report, for both horizontal and
#         vertical axes. 1 reports all the movements (default).
#
#   x,y:  Separate values for horizontal and vertical axes, can be separated by
#         spaces, commas, or semicolons.
#
# List of known games requiring the threshold to be set to 2:
#   - Ultima Underworld: The Stygian Abyss
#   - Ultima Underworld II: Labyrinth of Worlds
#
builtin_dos_mouse_driver_move_threshold = 1

# Additional built-in DOS mouse driver settings as a list of space or comma
# separated options (unset by default). Possible values:
#
#   immediate:       Update mouse movement counters immediately, without waiting
#                    for interrupt. May improve mouse latency in fast-paced games
#                    (arcade, FPS, etc.), but might cause issues in some titles.
#                    List of known incompatible games:
#                      - Ultima Underworld: The Stygian Abyss
#                      - Ultima Underworld II: Labyrinth of Worlds
#                    Please report other incompatible games so we can update this
#                    list.
#
#   modern:          If provided, v7.0+ Microsoft mouse driver behaviour is
#                    emulated, otherwise the v6.0 and earlier behaviour (the two
#                    are slightly incompatible). Only 'Descent II' with the
#                    official Voodoo patch has been found to require the v7.0+
#                    behaviour so far.
#
#   no-granularity:  Disables the mouse position granularity. Only enable if the
#                    game needs it. Only 'Joan of Arc: Siege & the Sword' in
#                    Hercules mode has been found to require disabled granularity
#                    so far.
#
builtin_dos_mouse_driver_options = 

# Set the PS/2 AUX port mouse model, or in other words, the type of the virtual
# mouse plugged into the emulated PS/2 mouse port ('explorer' by default). The
# setting has no effect on the built-in mouse driver (see 'dos_mouse_driver').
# Possible values:
#
#   standard:      3 buttons, standard PS/2 mouse.
#   intellimouse:  3 buttons + wheel, Microsoft IntelliMouse.
#   explorer:      5 buttons + wheel, Microsoft IntelliMouse Explorer (default).
#   none:          no PS/2 mouse.
#
ps2_mouse_model = explorer

# Set the default COM (serial) mouse model, or in other words, the type of the
# virtual mouse plugged into the emulated COM ports ('wheel+msm' by default).
# The setting has no effect on the built-in mouse driver (see 'dos_mouse_driver').
# Possible values:
#
#   2button:      2 buttons, Microsoft mouse.
#
#   3button:      3 buttons, Logitech mouse; mostly compatible with Microsoft
#                 mouse.
#
#   wheel:        3 buttons + wheel; mostly compatible with Microsoft mouse.
#
#   msm:          3 buttons, Mouse Systems mouse; NOT compatible with Microsoft
#                 mouse.
#
#   2button+msm:  Automatic choice between '2button' and 'msm'.
#   3button+msm:  Automatic choice between '3button' and 'msm'.
#   wheel+msm:    Automatic choice between 'wheel' and 'msm' (default).
#
# Note: Enable COM port mice in the [serial] section.
#
com_mouse_model = wheel+msm

# VMware mouse interface ('on' by default). Fully compatible only with 3rd party
# Windows 3.1 driver.
#
# Note: Requires PS/2 mouse to be enabled.
#
vmware_mouse = on

# VirtualBox mouse interface ('on' by default). Fully compatible only with 3rd
# party Windows 3.1 driver.
#
# Note: Requires PS/2 mouse to be enabled.
#
virtualbox_mouse = on


[mixer]

# Enable silent mode ('off' by default). Sound is still emulated in silent mode,
# but DOSBox outputs no sound to the host. Capturing the emulated audio output to
# a WAV file works in silent mode.
#
nosound = off

# Sample rate of DOSBox's internal audio mixer in Hz (48000 by default). Valid
# range is 8000 to 96000 Hz. The vast majority of consumer-grade audio hardware
# uses a native rate of 48000 Hz. Recommend leaving this as-is unless you have
# good reason to change it. The OS will most likely resample non-standard sample
# rates to 48000 Hz anyway.
#
rate = 22050

# Block size of the host audio device in sample frames (512 by default). Valid
# range is 64 to 8192. Should be set to power-of-two values (e.g., 256, 512, 1024,
# etc.) Larger values might help with sound stuttering but will introduce more
# latency. Also see 'negotiate'.
#
blocksize = 512

# How many milliseconds of sound to render in advance on top of 'blocksize'
# (20 by default). Larger values might help with sound stuttering but will
# introduce more latency.
#
prebuffer = 20

# Negotiate a possibly better 'blocksize' setting (on by default). Enable it if
# you're not getting audio or the sound is stuttering with your 'blocksize'
# setting. Disable it to force the manually set 'blocksize' value.
#
negotiate = on

# Enable the auto-leveling compressor on the master channel to prevent clipping
# of the audio output ('on' by default). Possible values:
#
#   off:  Disable compressor.
#   on:   Enable compressor (default).
#
compressor = off

# Set crossfeed on the OPL and CMS (Gameblaster) mixer channels ('off' by
# default). Many games pan the instruments 100% left and 100% right in the
# stereo field on these audio devices which is unpleasant to listen to in
# headphones. With crossfeed enabled, a portion of the left channel signal is
# mixed into the right channel and vice versa, creating a more natural listening
# experience. Possible values:
#
#   off:     No crossfeed (default).
#   on:      Enable crossfeed (normal preset).
#   light:   Light crossfeed (strength 15).
#   normal:  Normal crossfeed (strength 40).
#   strong:  Strong crossfeed (strength 65).
#
# Notes:
#   - Use the MIXER command to apply crossfeed to other audio channels as well
#     and to fine-tune the crossfeed strength per channel.
#
crossfeed = off

# Reverb effect that adds a sense of space to the sound ('off') by default.
# Possible values:
#
#   off:     No reverb (default).
#
#   on:      Enable reverb (medium preset).
#
#   tiny:    Simulates the sound of a small integrated speaker in a room;
#            specifically designed for small-speaker audio systems
#            (PC speaker, Tandy, PS/1 Audio, and LPT DAC devices).
#
#   small:   Adds a subtle sense of space; good for games that use a single
#            synth channel (typically OPL) for both music and sound effects.
#
#   medium:  Medium room preset that works well with a wide variety of games.
#
#   large:   Large hall preset recommended for games that use separate
#            channels for music and digital audio.
#
#   huge:    A stronger variant of the large hall preset; works really well
#            in some games with more atmospheric soundtracks.
#
# Notes:
#   - The presets apply a noticeable amount of reverb to the synth mixer channels
#     (except for synths with built-in reverb; e.g., the Roland MT-32), and a
#     subtle amount to the digital audio channels.
#
#   - Use the MIXER command to fine-tune the reverb levels per channel.
#
reverb = off

# Chorus effect that adds a sense of stereo movement to the sound ('off' by
# default). Possible values:
#
#   off:     No chorus (default).
#
#   on:      Enable chorus (normal preset).
#
#   light:   A light chorus effect (especially suited for synth music that
#            features lots of white noise).
#
#   normal:  Normal chorus that works well with a wide variety of games.
#
#   strong:  An obvious and upfront chorus effect.
#
# Notes:
#   - The presets apply the chorus effect to the synth channels only (except
#     for synths with built-in chorus; e.g. the Roland MT-32).
#
#   - Use the MIXER command to fine-tune the chorus levels per channel.
#
chorus = off

# Remove low-level residual noise from the output of the OPL synth and the Roland
# Sound Canvas ('on' by default). The emulation of these devices is accurate to
# the original hardware units, which includes the emulation of a very low-level
# semi-random noise. Although this is authentic, most people would find it
# slightly annoying. Possible values:
#
#   off:  Disable the denoiser.
#
#   on:   Enable the denoiser on the OPL and SOUNDCANVAS channels (default).
#         The denoiser does not introduce any sound quality degradation; it only
#         removes the barely audible residual noise in quiet passages.
#
denoiser = off


[fluidsynth]

# Name or path of SoundFont file to use ('default.sf2' by default). The SoundFont
# will be looked up in the following locations in order:
#
#   - The user-defined SoundFont directory (see 'soundfont_dir').
#   - The 'soundfonts' directory in your DOSBox configuration directory.
#   - Other common system locations.
#
# The '.sf2' extension can be omitted. You can use paths relative to the above
# locations or absolute paths as well.
#
# Note: Run `MIXER /LISTMIDI` to see the list of available SoundFonts.
#
soundfont = default.sf2

# Extra user-defined SoundFont directory (unset by default). If this is set,
# SoundFonts are looked up in this directory first, then in the the standard
# system locations.
#
soundfont_dir = 

# Set the SoundFont's volume as a percentage (100 by default). This is useful for
# normalising the volume of different SoundFonts. The percentage value can range
# from 1 to 800.
#
soundfont_volume = 100

# Configure the FluidSynth chorus ('auto' by default). Possible values:
#
#   auto:      Automatically apply optimised settings for common SoundFonts, or
#              enable chorus with the default settings for all other Soundfonts
#              (default).
#
#   on:        Always enable chorus.
#   off:       Disable chorus.
#
#   <custom>:  Custom setting via five space-separated values:
#                - voice-count:      Integer from 0 to 99
#                - level:            Decimal from 0.0 to 10.0
#                - speed:            Decimal from 0.1 to 5.0 (in Hz)
#                - depth:            Decimal from 0.0 to 21.0
#                - modulation-wave:  'sine' or 'triangle'
#              For example: 'fsynth_chorus = 3 1.2 0.3 8.0 sine'
#
# Note: You can disable the FluidSynth chorus and enable the mixer-level chorus
#       on the FluidSynth channel instead, or enable both chorus effects at the
#       same time. Whether this sounds good depends on the SoundFont and the
#       chorus settings being used.
#
fsynth_chorus = auto

# Configure the FluidSynth reverb ('auto' by default). Possible values:
#
#   auto:      Automatically apply optimised settings for common SoundFonts, or
#              enable reverb with the default settings for all other Soundfonts
#              (default).
#
#   on:        Enable reverb.
#   off:       Disable reverb.
#
#   <custom>:  Custom setting via four space-separated values:
#                - room-size:  Decimal from 0.0 to 1.0
#                - damping:    Decimal from 0.0 to 1.0
#                - width:      Decimal from 0.0 to 100.0
#                - level:      Decimal from 0.0 to 1.0
#              For example: 'fsynth_reverb = 0.61 0.23 0.76 0.56'
#
# Note: You can disable the FluidSynth reverb and enable the mixer-level reverb
#       on the FluidSynth channel instead, or enable both reverb effects at the
#       same time. Whether this sounds good depends on the SoundFont and the
#       reverb settings being used.
#
fsynth_reverb = auto

# Filter for the FluidSynth audio output ('off' by default). Possible values:
#
#   off:       Don't filter the output (default).
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
fsynth_filter = off


[soundcanvas]

# Roland Sound Canvas model to use ('auto' by default). One or more CLAP audio
# plugins that implement the supported Sound Canvas models must be present in the
# 'plugins' directory in your DOSBox installation or configuration directory.
# DOSBox searches for the requested model by inspecting the plugin descriptions.
# The lookup for the best model is performed in order as listed. Possible values:
#
#   auto:       Pick the best available model (default).
#   sc55:       Pick the best available original SC-55 model.
#   sc55mk2:    Pick the best available SC-55mk2 model.
#   <version>:  Use the exact specified model version (e.g., 'sc55_121').
#
soundcanvas_model = auto

# The directory containing the Roland Sound Canvas ROMs (unset by default).
# The directory can be absolute or relative, or leave it unset to use the
# 'soundcanvas-roms' directory in your DOSBox configuration directory. Other
# common system locations will be checked as well.
#
soundcanvas_rom_dir = 

# Filter for the Roland Sound Canvas audio output ('on' by default).
# Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
soundcanvas_filter = on


[midi]

# Set where MIDI data from the emulated MPU-401 MIDI interface is sent
# ('port' by default). Possible values:
#
#   port:         A MIDI port of the host operating system's MIDI interface
#                 (default). You can configure the port to use with the
#                 'midiconfig' setting.
#
#   fluidsynth:   The internal FluidSynth MIDI synthesizer (SoundFont player)
#                 (requires the FluidSynth dynamic-link library to be available;
#                 see the [fluidsynth] section).
#
#   none:         Disable MIDI output.
#
mididevice = fluidsynth

# Configuration options for the selected MIDI device (unset by default).
# Notes:
#
#   - The setting has no effect when using the internal synthesizers
#     ('mididevice = fluidsynth', 'mt32', or 'soundcanvas').
#
#   - If you're using a physical rev.0 Roland MT-32, the hardware may require a
#     delay to prevent buffer overflows. You can enable this with 'delaysysex'
#     after the port ID or name (e.g., 'midiconfig = 2 delaysysex').
#
midiconfig = 

# MPU-401 mode to emulate ('intelligent' by default).
#
mpu401 = intelligent

# Enable raw, unaltered MIDI output ('off' by default). The MIDI drivers of many
# games don't fully conform to the MIDI standard, which makes editing the MIDI
# recordings of these games very error-prone and cumbersome in MIDI sequencers,
# often resulting in hanging or missing notes. DOSBox corrects the MIDI output of
# such games by default. This results in no audible difference whatsoever; it only
# affects the representation of the MIDI data.
#
# You should only enable 'raw_midi_output' if you really need to capture the raw,
# unaltered MIDI output of a program, e.g. when working with music applications,
# or when debugging MIDI issues.
#
raw_midi_output = off


[sblaster]

# Sound Blaster model to emulate ('sb16' by default). The models auto-selected
# with 'oplmode' and 'cms' on 'auto' are also listed. Possible values:
#
#   gb:        Game Blaster          - CMS
#   sb1:       Sound Blaster 1.0     - OPL2, CMS
#   sb2:       Sound Blaster 2.0     - OPL2
#   sbpro1:    Sound Blaster Pro     - Dual OPL2
#   sbpro2:    Sound Blaster Pro 2   - OPL3
#   sb16:      Sound Blaster 16      - OPL3 (default)
#   ess:       ESS ES1688 AudioDrive - ESFM
#   none/off:  Disable Sound Blaster emulation.
#
# Notes:
#   - Creative Music System was later rebranded to Game Blaster; they are the
#     same card.
#
#   - The 'ess' option is for getting ESS Enhanced FM music via the card's ESFM
#     synthesiser in games that support it. The ESS DAC is not emulated but the
#     card is Sound Blaster Pro compatible; just configure the game for Sound
#     Blaster digital sound.
#
sbtype = sb16

# The IO address of the Sound Blaster (220 by default).
# Possible values: 220, 240, 260, 280, 2a0, 2c0, 2e0, 300
#
sbbase = 220

# The IRQ number of the Sound Blaster (7 by default).
# Possible values: 3, 5, 7, 9, 10, 11, 12
#
irq = 7

# The DMA channel of the Sound Blaster (1 by default).
# Possible values: 0, 1, 3, 5, 6, 7
#
dma = 1

# The High DMA channel of the Sound Blaster 16 (5 by default).
# Possible values: 0, 1, 3, 5, 6, 7
#
hdma = 5

# Allow the Sound Blaster mixer to modify volume levels ('on' by default).
# Sound Blaster Pro 1 and later cards allow programs to set the volume of the
# digital audio (DAC), FM synth, and CD Audio output. These correspond to the
# SB, OPL, and CDAUDIO DOSBox mixer channels, respectively. Possible values:
#
#   on:   The final level of the above channels is a combination of the volume
#         set by the program, and the volume set in the DOSBox mixer.
#
#   off:  Only the DOSBox mixer determines the volume of these channels.
#
# Note: Some games change the volume levels dynamically (e.g., lower the FM music
#       volume when speech is playing); it's best to leave 'sbmixer' enabled for
#       such games.
#
sbmixer = on

# Silence initial DMA audio after card power-on, in milliseconds (100 by default).
# This mitigates pops heard when starting many SB-based games. Reduce this if you
# notice intial playback is missing audio.
#
sbwarmup = 100

# Type of filter to emulate for the Sound Blaster digital sound output ('modern'
# by default). Possible values:
#
#   auto:      Use the appropriate filter determined by 'sbtype'.
#
#   sb1, sb2, sbpro1, sbpro2, sb16:
#              Use the filter of this Sound Blaster model.
#
#   modern:    Use linear interpolation upsampling that acts as a low-pass
#              filter; this is the legacy DOSBox behaviour (default).
#
#   off:       Don't filter the output.
#
#   <custom>:  One or two custom filters in the following format:
#                TYPE ORDER FREQ
#              Where TYPE can be 'hpf' (high-pass) or 'lpf' (low-pass),
#              ORDER is the order of the filter from 1 to 16
#              (1st order = 6dB/oct slope, 2nd order = 12dB/oct, etc.),
#              and FREQ is the cutoff frequency in Hz. Examples:
#                 lpf 2 12000
#                 hpf 3 120 lpf 1 6500
#
sb_filter = modern

# Force the Sound Blaster Pro 2 filter to be always on ('off' by default).
# Other Sound Blaster models don't allow toggling the filter in software.
#
sb_filter_always_on = off

# OPL model to emulate ('auto' by default). Possible values:
#
#   auto:      Use the appropriate model determined by 'sbtype'.
#   opl2:      Yamaha OPL2 (YM3812, mono).
#   dualopl2:  Dual OPL2 (two OPL2 chips in stereo configuration).
#   opl3:      Yamaha OPL3 (YMF262, stereo).
#
#   opl3gold:  OPL3 and the optional AdLib Gold Surround module.
#              Use with 'sbtype = sb16' to emulate the AdLib Gold 1000.
#
#   esfm:      ESS ESFM (enhanced Yamaha OPL3 compatible FM synth).
#   none/off:  Disable OPL emulation.
#
# Notes:
#   - 'sbtype = none' and 'oplmode = opl2' emulates the original AdLib card.
#   - Only 'oplmode = esfm' is not enough to get ESS Enhanced FM music in games;
#     you'll also need to set 'sbtype = ess'. 'oplmode = esfm' is useful to
#     get ESFM-flavoured OPL with original Sound Blaster models.
#
oplmode = auto

# Fade out hanging notes on the OPL synth ('off' by default). Possible values:
#
#   off:       Don't fade out hanging notes (default).
#
#   fade:      Fade out hanging notes. You should only enable this in games that
#              sometimes play hanging notes that never stop (e.g., Bard's Tale).
#
#   <custom>:  A custom fade-out definition in the following format:
#                WAIT FADE
#              Where WAIT is how long after the last I/O port write fading begins
#              (between 100 and 5000 milliseconds); and FADE is the fade-out
#              period (between 10 and 3000 milliseconds).
#              Examples:
#                300 200   (wait 300 ms before fading out over a 200 ms period)
#                1000 3000 (wait 1 second before fading out over 3 seconds)
#
opl_fadeout = off

# Remove DC bias from the OPL output ('off' by default). This should only be used
# as a last resort to fix popping in games that play PCM audio using the OPL
# synthesiser on a Sound Blaster or AdLib card, such as in: Golden Eagle (1991),
# Wizardry 6 (1990), and Wizardry 7 (1992). Please open an issue ticket if you
# find other affected games.
#
opl_remove_dc_bias = off

# Type of filter to emulate for the Sound Blaster OPL output ('auto' by default).
# Possible values:
#
#   auto:      Use the appropriate filter determined by 'sbtype' (default).
#
#   sb1, sb2, sbpro1, sbpro2, sb16:
#              Use the filter of this Sound Blaster model.
#
#   off:       Don't filter the output.
#
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
opl_filter = auto

# Enable CMS emulation ('auto' by default). Possible values:
#
#   off:   Disable CMS emulation (except when the Game Blaster is selected).
#   on:    Enable CMS emulation on Sound Blaster 1 and 2.
#   auto:  Auto-enable CMS emulation for Sound Blaster 1 and Game Blaster.
#
cms = auto

# Filter for the Sound Blaster CMS output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
cms_filter = on


[gus]

# Enable Gravis UltraSound emulation ('off' by default). Many games and all demos
# upload their own sounds, but some rely on the instrument patch files included
# with the GUS for MIDI playback (see 'ultradir' for details). Some games also
# require ULTRAMID.EXE to be loaded prior to starting the game.
#
# Note: The default settings of base address 240, IRQ 5, and DMA 3 have been
#       chosen so the GUS can coexist with a Sound Blaster card. This works fine
#       for the majority of programs, but some games and demos expect the GUS
#       factory defaults of base address 220, IRQ 11, and DMA 1. The default
#       IRQ 11 is also problematic with specific versions of the DOS4GW extender
#       that cannot handle IRQs above 7.
#
gus = off

# The IO base address of the Gravis UltraSound (240 by default).
# Possible values: 210, 220, 230, 240, 250, 260
#
gusbase = 240

# The IRQ number of the Gravis UltraSound (5 by default).
# Possible values: 2, 3, 5, 7, 11, 12, 15
#
gusirq = 5

# The DMA channel of the Gravis UltraSound (3 by default).
# Possible values: 1, 3, 5, 6, 7
#
gusdma = 3

# Filter for the Gravis UltraSound audio output ('on' by default).
# Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
gus_filter = on

# Path to the UltraSound directory ('C:\ULTRASND' by default). This should have a
# 'MIDI' subdirectory containing the patches (instrument files) required by some
# games for MIDI music playback. Not all games need these patches; many GUS-native
# games and all demos upload their own custom sounds instead.
#
ultradir = C:\ULTRASND


[imfc]

# Enable the IBM Music Feature Card ('off' by default).
#
imfc = off

# The IO base address of the IBM Music Feature Card ('2A20' by default).
# Possible values: 2A20, 2A30
#
imfc_base = 2a20

# The IRQ number of the IBM Music Feature Card (3 by default).
# Possible values: 2, 3, 4, 5, 6, 7
#
imfc_irq = 3

# Filter for the IBM Music Feature Card output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
imfc_filter = on


[innovation]

# Enable emulation of the Innovation SSI-2001 and Microprose's "The Entertainer"
# sound cards on base port of 280. These use the iconic MOS 6581 SID chip of the
# Commodore 64 personal computer from the 1980s. Only 15 games are known to
# support these cards.
#
innovation = off

# Adjusts the 6581's filtering strength as a percentage from 0 to 100 (50 by
# default). The SID's analog filtering meant that each chip was physically unique.
#
innovation_sid_filter = 50

# Filter for the Innovation audio output ('off' by default). Possible values:
#
#   off:       Don't filter the output (default).
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
innovation_filter = off


[speaker]

# Type of DAC plugged into the parallel port ('none' by default). Possible values:
#
#   disney:    Disney Sound Source.
#   covox:     Covox Speech Thing.
#   ston1:     Stereo-on-1 DAC, in stereo up to 30 kHz.
#   none/off:  Don't use a parallel port DAC (default).
#
lpt_dac = none

# Filter for the LPT DAC audio device(s) ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
lpt_dac_filter = on

# PC speaker emulation model ('impulse' by default). Possible values:
#
#   impulse:    A very faithful emulation of the PC speaker's output (default).
#               Works with most games, but may result in garbled sound or silence
#               in a small number of programs.
#
#   discrete:   Legacy simplified PC speaker emulation; only use this on specific
#               titles that give you problems with the 'impulse' model.
#
#   none, off:  Don't emulate the PC speaker.
#
pcspeaker = impulse

# Filter for the PC speaker output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
pcspeaker_filter = on

# Enable IBM PS/1 Audio emulation ('off' by default).
#
ps1audio = off

# Filter for the PS/1 Audio synth output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
ps1audio_filter = on

# Filter for the PS/1 Audio DAC output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
ps1audio_dac_filter = on

# Set the Tandy/PCjr 3 Voice sound emulation ('auto') by default. Possible values:
#
#   auto:  Automatically enable Tandy/PCjr sound for the 'tandy' and 'pcjr'
#          machine types only (default).
#
#   on:    Enable Tandy/PCjr sound with DAC support, when possible.
#          Most games also need the machine set to 'tandy' or 'pcjr' to work.
#
#   psg:   Only enable the card's three-voice programmable sound generator
#          without DAC to avoid conflicts with other cards using DMA 1.
#
#   off:   Disable Tandy/PCjr sound.
#
tandy = auto

# Fade out the Tandy synth output after the last IO port write ('off' by default).
# Possible values:
#
#   off:       Don't fade out; residual output will play forever (default).
#   on:        Wait 0.5s before fading out over a 0.5s period.
#   <custom>:  Custom fade out definition; see 'opl_fadeout' for details.
#
tandy_fadeout = off

# Filter for the Tandy synth output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
tandy_filter = on

# Filter for the Tandy DAC output ('on' by default). Possible values:
#
#   on:        Filter the output (default).
#   off:       Don't filter the output.
#   <custom>:  Custom filter definition; see 'sb_filter' for details.
#
tandy_dac_filter = on


[disknoise]

# Enable emulated hard disk noises ('off' by default). Plays spinning disk and
# seek noise sounds when enabled. It's recommended to set 'hard_disk_speed' to
# lower than 'maximum' for an authentic experience. Possible values:
#
#   off:           No hard disk noises (default).
#   seek-only:     Play hard disk seek noises only, no spin noises.
#   on:            Play both hard disk seek and spin noises.
#
# Note: You can customise the disk noise volume by changing the volume of the
#       `DISKNOISE` mixer channel.
#
hard_disk_noise = off

# Enable emulated floppy disk noises ('off' by default). Plays spinning disk and
# seek noise sounds when enabled. It's recommended to set 'floppy_disk_speed' to
# lower than 'maximum' for an authentic experience. Possible values:
#
#   off:           No floppy disk noises (default).
#   seek-only:     Play floppy disk seek noises only, no spin noises.
#   on:            Play both floppy disk seek and spin noises.
#
# Note: You can customise the disk noise volume by changing the volume of the
#       `DISKNOISE` mixer channel.
#
floppy_disk_noise = off


[reelmagic]

# ReelMagic (aka REALmagic) MPEG playback support ('off' by default).
# Possible values:
#
#   off:       Disable support (default).
#   cardonly:  Initialize the card without loading the FMPDRV.EXE driver.
#   on:        Initialize the card and load the FMPDRV.EXE on startup.
#
reelmagic = off

# Set the 32-bit magic key used to decode the game's videos ('auto' by default).
# Possible values:
#
#   auto:      Use the built-in routines to determine the key (default).
#   common:    Use the most commonly found key, which is 0x40044041.
#   thehorde:  Use The Horde's key, which is 0xC39D7088.
#   <custom>:  Set a custom key in hex format (e.g., 0x12345678).
#
reelmagic_key = auto

# Override the frame rate code used during video playback (0 by default).
# Possible values:
#
#   0:       No override: attempt automatic rate discovery (default).
#
#   1 to 7:  Override the frame rate to one the following (use 1 through 7):
#            1=23.976, 2=24, 3=25, 4=29.97, 5=30, 6=50, or 7=59.94 FPS.
#
reelmagic_fcode = 0


[joystick]

# Type of joystick to emulate ('auto' by default). Possible values:
#
#   auto:      Detect and use any joystick(s), if possible (default).
#              Joystick emulation is disabled if no joystick is found.
#
#   2axis:     Support up to two joysticks, each with 2 axis.
#
#   4axis:     Support the first joystick only, as a 4-axis type.
#
#   4axis_2:   Support the second joystick only, as a 4-axis type.
#
#   fcs:       Emulate joystick as an original Thrustmaster FCS.
#
#   ch:        Emulate joystick as an original CH Flightstick.
#
#   hidden:    Prevent DOS from seeing the joystick(s), but enable them
#              for mapping.
#
#   disabled:  Fully disable joysticks: won't be polled, mapped,
#              or visible in DOS.
#
# Note: Remember to reset DOSBox's mapperfile if you saved it earlier.
#
joysticktype = auto

# Enable timed intervals for axis ('on' by default). Experiment with this option
# if your joystick drifts away.
#
timed = on

# Fire continuously as long as the button is pressed ('off' by default)
#
autofire = off

# Swap the 3rd and the 4th axis ('off' by default). Can be useful for certain
# joysticks.
#
swap34 = off

# Enable button wrapping at the number of emulated buttons ('off' by default).
#
buttonwrap = off

# Enable translation of circular input to square output ('off' by default).
# Try enabling this if your left analog stick can only move in a circle.
#
circularinput = off

# Percentage of motion to ignore (10 by default). Valid range is 0 to 100.
# 100 turns the stick into a digital one.
#
deadzone = 10

# Enable hotkeys to allow realtime calibration of the joystick's X and Y axes
# ('off' by default). Only consider this as a last resort if in-game calibration
# doesn't work correctly. Instructions:
#
#   - Press Ctrl/Cmd+Arrow-keys adjust the axis' scalar value:
#       - Left and Right diminish or magnify the x-axis scalar, respectively.
#       - Down and Up diminish or magnify the y-axis scalar, respectively.
#
#   - Press Alt+Arrow-keys adjust the axis' offset position:
#       - Left and Right shift X-axis offset in the given direction.
#       - Down and Up shift the Y-axis offset in the given direction.
#
#   - Reset the X and Y calibration using Ctrl+Delete and Ctrl+Home, respectively.
#
# Each tap will report X or Y calibration values you can set below. When you find
# parameters that work, quit the game, switch this setting back to disabled, and
# populate the reported calibration parameters.
#
use_joy_calibration_hotkeys = off

# Apply X-axis calibration parameters from the hotkeys ('auto' by default).
#
joy_x_calibration = auto

# Apply Y-axis calibration parameters from the hotkeys ('auto' by default).
#
joy_y_calibration = auto


[serial]

# Set type of device connected to the COM1 port ('dummy' by default).
# Possible values:
#
#   disabled:  Disables the port.
#   dummy:     Emulates the port without a device attached to it.
#   mouse:     Emulates a serial mouse attached to the port.
#   modem:     Emulates a modem attached to the port.
#   nullmodem: Emulates a nullmoden attached to the port.
#   direct:    Emulates a direct serial link.
#
# Additional parameters must be on the same line in the form of PARAMETER:VALUE.
# The optional 'irq' parameter is common for all types. Available parameters:
#
#   - for 'mouse':      model (optional; overrides the 'com_mouse_model' setting).
#
#   - for 'direct':     realport (required), rxdelay (optional).
#                       (e.g., realport:COM1, realport:ttyS0).
#
#   - for 'modem':      listenport, sock, bps (all optional).
#
#   - for 'nullmodem':  server, rxdelay, txdelay, telnet, usedtr,
#                       transparent, port, inhsocket, sock (all optional).
#
# The 'sock' parameter specifies the protocol to use at both sides of the
# connection. Valid values are 0 for TCP, and 1 for ENet reliable UDP.
# Example:
#   serial1=modem listenport:5000 sock:1
#
serial1 = dummy

# See 'serial1' ('dummy' by default).
#
serial2 = dummy

# See 'serial1' ('disabled' by default).
#
serial3 = disabled

# See 'serial1' ('disabled' by default).
#
serial4 = disabled

# File used to map fake phone numbers to addresses
# ('phonebook.txt' by default).
#
phonebookfile = phonebook.txt


[dos]

# Enable XMS memory support ('on' by default).
#
xms = on

# Enable EMS support ('on' by default). Enabled provides the best compatibility
# but certain applications may run better with other choices, or require EMS
# support to be disabled to work at all.
#
ems = on

# Enable UMB memory support ('on' by default).
#
umb = on

# Set PCjr memory layout ('expanded' by default). Possible values:
#
#   expanded:  640 KB total memory with applications residing above 128 KB.
#              Compatible with most games.
#
#   standard:  128 KB total memory with applications residing below 96 KB.
#              Required for some older games (e.g., Jumpman, Troll).
#
pcjr_memory_config = expanded

# Set DOS version in MAJOR.MINOR format (5.0 by default). A single number is
# treated as the major version. Common settings are 3.3, 5.0, 6.22, and 7.1.
#
ver = 5.0

# Set locale epoch ('native' by default). Possible values:
#
#   historic:  If data is available for the given country, mimic old DOS behavior
#              when displaying time, dates, or numbers.
#
#   modern:    Follow current day practices for user experience more consistent
#              with typical host systems.
#
#   native:    Re-use current host OS settings, regardless of the country set;
#              use 'modern' data to fill-in the gaps when the DOS locale system
#              is too limited to follow the desktop settings.
#
locale_period = native

# Set DOS country code ('auto' by default). This affects country-specific
# information such as date, time, and decimal formats. If set to 'auto', it
# selects the country code reflecting the host OS settings.
#
# The list of country codes can be displayed using '--list-countries' command-line
# argument.
#
country = auto

# Keyboard layout code ('auto' by default). The list of supported keyboard layout
# codes can be displayed using the '--list-layouts' command-line argument, e.g.,
# 'uk' is the British English layout. The layout can be followed by the code page
# number, e.g., 'uk 850' selects a Western European screen font.
#
# Set to 'auto' to guess the values from the host OS settings. After startup, use
# the 'KEYB' command to manage keyboard layouts and code pages (run 'HELP KEYB'
# for details).
#
keyboard_layout = auto

# Enable expanding environment variables such as %PATH% in the DOS command shell
# ('auto' by default). FreeDOS and MS-DOS 7.0+ COMMAND.COM supports this behavior.
# Possible values:
#
#   auto:  Enabled if DOS version is 7.0 or above (default).
#   on:    Enable expansion of environment variables.
#   off:   Disable expansion of environment variables.
#
expand_shell_variable = auto

# File containing persistent command line history ('shell_history.txt' by
# default). Setting it to empty disables persistent shell history.
#
shell_history_file = shell_history.txt

# File containing the list of applications and assigned DOS versions, in a
# tab-separated format, used by SETVER.EXE as a persistent storage (empty by
# default).
#
setver_table_file = 

# Enable file locking via emulating SHARE.EXE ('auto' by default). This is
# required for some Windows 3.1 applications to work properly. It generally does
# not cause problems for DOS games except in rare cases (e.g., Astral Blur demo).
# If you experience crashes related to file permissions, you can try disabling
# this. Possible values:
#
#   auto:  Enable file locking only when Windows 3.1 is running.
#   on:    Always enable file locking.
#   off:   Always disable file locking.
#
file_locking = auto


[ethernet]

# Enable emulation of a Novell NE2000 network card on a software-based network
# with the following properties ('off' by default):
#
#   - 255.255.255.0   Subnet mask of the 10.0.2.0 virtual LAN.
#   - 10.0.2.2        IP of the gateway and DHCP service.
#   - 10.0.2.3        IP of the virtual DNS server.
#   - 10.0.2.15       First IP provided by DHCP (this is your IP)
#
# Note: Using this feature requires an NE2000 packet driver, a DHCP client, and a
#       TCP/IP stack set up in DOS. You might need port-forwarding from your host
#       OS into DOSBox, and from your router to your host OS when acting as the
#       server in multiplayer games.
#
ne2000 = off

# Base address of the NE2000 card (300 by default).
# Note: Addresses 220 and 240 might not be available as they're assigned to the
#       Sound Blaster and Gravis UltraSound by default.
#
nicbase = 300

# The interrupt used by the NE2000 card (3 by default).
# Note: IRQs 3 and 5 might not be available as they're assigned to
#       'serial2' and the Gravis UltraSound by default.
#
nicirq = 3

# The MAC address of the NE2000 card ('AC:DE:48:88:99:AA' by default).
#
macaddr = AC:DE:48:88:99:AA

# Forward one or more TCP ports from the host into the DOS guest (unset by
# default). The format is:
#
#   port1  port2  port3 ... (e.g., 21 80 443)
#   This will forward FTP, HTTP, and HTTPS into the DOS guest.
#
# If the ports are privileged on the host, a mapping can be used:
#
#   host:guest  ..., (e.g., 8021:21 8080:80)
#   This will forward ports 8021 and 8080 to FTP and HTTP in the guest.
#
# A range of adjacent ports can be abbreviated with a dash:
#
#   start-end ... (e.g., 27910-27960)
#   This will forward ports 27910 to 27960 into the DOS guest.
#
# Mappings and ranges can be combined, too:
#
#   hstart-hend:gstart-gend ..., (e.g, 8040-8080:20-60)
#   This forwards ports 8040 to 8080 into 20 to 60 in the guest.
#
# Notes:
#   - If mapped ranges differ, the shorter range is extended to fit.
#   - If conflicting host ports are given, only the first one is setup.
#   - If conflicting guest ports are given, the latter rule takes precedent.
#
tcp_port_forwards = 

# Forward one or more UDP ports from the host into the DOS guest (unset by
# default). The format is the same as for TCP port forwards.
#
udp_port_forwards = 


[autoexec]

# Each line in this section is executed at startup as a DOS command.
# Important: The [autoexec] section must be the last section in the config!
mount s /share/dosbox
